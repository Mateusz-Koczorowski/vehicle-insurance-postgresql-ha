listen_addresses = '*'
port = 9999
socket_dir = '/var/run/postgresql'
pcp_listen_addresses = 'localhost'
pcp_port = 9898
pcp_socket_dir = '/var/run/postgresql'

backend_hostname0 = 'pg-primary'
backend_port0 = 5432
backend_weight0 = 1
backend_data_directory0 = '/var/lib/postgresql/18/docker'
backend_flag0 = 'ALLOW_TO_FAILOVER'
backend_application_name0 = 'pg-primary'

backend_hostname1 = 'pg-standby-a'
backend_port1 = 5432
backend_weight1 = 1
backend_data_directory1 = '/var/lib/postgresql/18/docker'
backend_flag1 = 'ALLOW_TO_FAILOVER'
backend_application_name1 = 'pg-standby-a'

backend_hostname2 = 'pg-standby-dr'
backend_port2 = 5432
backend_weight2 = 1
backend_data_directory2 = '/var/lib/postgresql/18/docker'
backend_flag2 = 'ALLOW_TO_FAILOVER'
backend_application_name2 = 'pg-standby-dr'

enable_pool_hba = on
pool_passwd = '/tmp/pool_passwd'
authentication_timeout = 60
allow_clear_text_frontend_auth = off

backend_clustering_mode = 'streaming_replication'
load_balance_mode = on
statement_level_load_balance = on
disable_load_balance_on_write = 'transaction'
database_redirect_preference_list = 'postgres:primary,repmgr:primary'
app_name_redirect_preference_list = 'pg_dump:primary,pg_restore:primary'

sr_check_period = 3
sr_check_user = 'healthcheck_user'
sr_check_password = '@HEALTHCHECK_PASSWORD@'
sr_check_database = 'vehicle_insurance'
delay_threshold = 10485760

health_check_period = 3
health_check_timeout = 5
health_check_user = 'healthcheck_user'
health_check_password = '@HEALTHCHECK_PASSWORD@'
health_check_database = 'vehicle_insurance'
health_check_max_retries = 3
health_check_retry_delay = 1
connect_timeout = 10000

failover_on_backend_error = off
detach_false_primary = on
search_primary_node_timeout = 15
auto_failback = off

num_init_children = 32
max_pool = 4
child_life_time = 300
client_idle_limit = 300
connection_life_time = 300

log_destination = 'stderr'
logging_collector = off
log_connections = on
log_disconnections = on
log_per_node_statement = off
log_min_messages = warning
pid_file_name = '/var/run/postgresql/pgpool.pid'
