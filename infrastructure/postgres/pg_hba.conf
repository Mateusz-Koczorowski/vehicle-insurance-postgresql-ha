# Local administrative access still requires a password.
local   all                 all                                     scram-sha-256
host    all                 postgres            127.0.0.1/32        scram-sha-256
host    all                 postgres            ::1/128             scram-sha-256

# Physical replication: exact standby addresses only.
host    replication         replicator          172.31.0.11/32      scram-sha-256
host    replication         replicator          172.31.0.12/32      scram-sha-256
host    replication         replicator          172.32.0.12/32      scram-sha-256
host    replication         replicator          172.32.0.11/32      scram-sha-256

# repmgr metadata and node-to-node administration.
host    repmgr              repmgr              172.31.0.11/32      scram-sha-256
host    repmgr              repmgr              172.31.0.12/32      scram-sha-256
host    repmgr              repmgr              172.32.0.12/32      scram-sha-256
host    repmgr              repmgr              172.32.0.11/32      scram-sha-256

# PgPool-II connects from one address per database segment.
host    vehicle_insurance   healthcheck_user    172.31.0.20/32      scram-sha-256
host    vehicle_insurance   healthcheck_user    172.32.0.30/32      scram-sha-256
host    vehicle_insurance   app_agent_anna      172.31.0.20/32      scram-sha-256
host    vehicle_insurance   app_agent_anna      172.32.0.30/32      scram-sha-256
host    vehicle_insurance   app_adjuster_piotr  172.31.0.20/32      scram-sha-256
host    vehicle_insurance   app_adjuster_piotr  172.32.0.30/32      scram-sha-256
host    vehicle_insurance   app_auditor_ewa     172.31.0.20/32      scram-sha-256
host    vehicle_insurance   app_auditor_ewa     172.32.0.30/32      scram-sha-256
host    vehicle_insurance   backup_operator     172.31.0.20/32      scram-sha-256
host    vehicle_insurance   backup_operator     172.32.0.30/32      scram-sha-256
host    all                 postgres            172.31.0.20/32      scram-sha-256
host    all                 postgres            172.32.0.30/32      scram-sha-256

# No catch-all network rule is intentionally present.
